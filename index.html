<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Slider Controller</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 80px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .panel h3 {
            margin-bottom: 15px;
            color: #fff;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #e0e6ff;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.3);
        }

        .btn {
            background: linear-gradient(45deg, #4a90e2, #357abd);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
            min-width: 100px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success { background: linear-gradient(45deg, #28a745, #20c997); }
        .danger { background: linear-gradient(45deg, #dc3545, #c82333); }
        .warning { background: linear-gradient(45deg, #ffc107, #e0a800); color: #000; }
        .secondary { background: linear-gradient(45deg, #6c757d, #545b62); }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-group input[type="range"] {
            flex: 1;
        }

        .slider-value {
            min-width: 60px;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 5px;
            padding: 5px;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
            text-align: center;
        }

        .status.connected {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid #28a745;
            color: #28a745;
        }

        .status.disconnected {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
            color: #dc3545;
        }

        .jog-controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            grid-template-rows: auto auto auto;
            gap: 10px;
            align-items: center;
            margin: 15px 0;
        }

        .jog-controls .btn {
            min-width: 60px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .jog-up { grid-column: 2; grid-row: 1; }
        .jog-left { grid-column: 1; grid-row: 2; }
        .jog-stop { grid-column: 2; grid-row: 2; background: #dc3545; }
        .jog-right { grid-column: 3; grid-row: 2; }
        .jog-down { grid-column: 2; grid-row: 3; }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .preset-btn {
            padding: 15px 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #4a90e2;
        }

        .preset-btn.set {
            background: rgba(40, 167, 69, 0.3);
            border-color: #28a745;
        }

        .quick-actions-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎬 Camera Slider Controller</h1>

        <div class="grid">

            <!-- CONNECTION PANEL -->
            <div class="panel">
                <h3>📡 Connection</h3>

                <div id="connectionStatus" class="status disconnected">Disconnected</div>

                <button class="btn" onclick="connectToSlider()">Connect to Slider</button>
                <button class="btn secondary" onclick="disconnectFromSlider()">Disconnect</button>

                <div class="control-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="debugMode" onchange="toggleDebugMode()">
                        <label for="debugMode">Debug Mode</label>
                    </div>
                </div>
            </div>

            <!-- MOTOR 1 PANEL -->
            <div class="panel">
                <h3>🎯 Motor 1 (Pan/Tilt)</h3>

                <div class="control-group">
                    <label for="m1Start">Start Position:</label>
                    <input type="number" id="m1Start" value="0" step="10"
                           onchange="updateEstimatedTime()" 
                           oninput="sendIfConnected('M1S:' + this.value)">
                </div>

                <div class="control-group">
                    <label for="m1End">End Position:</label>
                    <input type="number" id="m1End" value="2000" step="10"
                           onchange="updateEstimatedTime()" 
                           oninput="sendIfConnected('M1E:' + this.value)">
                </div>

                <div class="control-group">
                    <label for="m1Speed">Speed (steps/sec):</label>
                    <div class="slider-group">
                        <input type="range" id="m1Speed" min="100" max="6000" value="2000" step="100"
                               oninput="updateSpeedDisplay('m1', this.value); updateEstimatedTime(); sendIfConnected('M1SPD:' + Math.round(this.value * currentSpeedMultiplier))">
                        <span class="slider-value" id="m1SpeedValue">2000</span>
                    </div>
                </div>

                <div class="control-group">
                    <button class="btn secondary" onclick="setCurrentPositionAs('m1Start')">Set Current as Start</button>
                    <button class="btn secondary" onclick="setCurrentPositionAs('m1End')">Set Current as End</button>
                </div>
            </div>

            <!-- MOTOR 2 PANEL -->
            <div class="panel">
                <h3>🎯 Motor 2 (Slider)</h3>

                <div class="control-group">
                    <label for="m2Start">Start Position:</label>
                    <input type="number" id="m2Start" value="0" step="10"
                           onchange="updateEstimatedTime()" 
                           oninput="sendIfConnected('M2S:' + this.value)">
                </div>

                <div class="control-group">
                    <label for="m2End">End Position:</label>
                    <input type="number" id="m2End" value="2000" step="10"
                           onchange="updateEstimatedTime()" 
                           oninput="sendIfConnected('M2E:' + this.value)">
                </div>

                <div class="control-group">
                    <label for="m2Speed">Speed (steps/sec):</label>
                    <div class="slider-group">
                        <input type="range" id="m2Speed" min="100" max="6000" value="2000" step="100"
                               oninput="updateSpeedDisplay('m2', this.value); updateEstimatedTime(); sendIfConnected('M2SPD:' + Math.round(this.value * currentSpeedMultiplier))">
                        <span class="slider-value" id="m2SpeedValue">2000</span>
                    </div>
                </div>

                <div class="control-group">
                    <button class="btn secondary" onclick="setCurrentPositionAs('m2Start')">Set Current as Start</button>
                    <button class="btn secondary" onclick="setCurrentPositionAs('m2End')">Set Current as End</button>
                </div>
            </div>

            <!-- SEQUENCE PANEL -->
            <div class="panel">
                <h3>🎬 Sequence Settings</h3>

                <div class="control-group">
                    <label for="cycles">Cycles (0 = infinite):</label>
                    <input type="number" id="cycles" min="0" max="999" value="1"
                           onchange="updateEstimatedTime()" 
                           oninput="sendIfConnected('CYCLES:' + this.value)">
                </div>

                <div class="control-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="returnHome" checked
                               onchange="updateEstimatedTime(); sendIfConnected('RETURN:' + (this.checked ? '1' : '0'))">
                        <label for="returnHome">Return to Start Position</label>
                    </div>
                </div>

                <div class="control-group">
                    <label>Estimated Time: <span id="estimatedTime">0:00</span></label>
                </div>

                <div class="control-group">
                    <button class="btn success" onclick="startSequence()">▶️ Start Sequence</button>
                    <button class="btn danger" onclick="stopSequence()">⏹️ Stop</button>
                    <button class="btn secondary" onclick="homeMotors()">🏠 Home</button>
                </div>
            </div>

            <!-- MANUAL CONTROL PANEL -->
            <div class="panel">
                <h3>🕹️ Manual Control</h3>

                <div class="control-group">
                    <label for="speedMultiplier">Speed Multiplier:</label>
                    <div class="slider-group">
                        <input type="range" id="speedMultiplier" min="0.1" max="3" value="1" step="0.1"
                               oninput="updateSpeedMultiplier(this.value)">
                        <span class="slider-value" id="speedMultiplierValue">1.0x</span>
                    </div>
                </div>

                <div class="jog-controls">
                    <button class="btn jog-up" 
                        onmousedown="startJog('M1', 1)" 
                        onmouseup="stopJog()" 
                        ontouchstart="startJog('M1', 1)" 
                        ontouchend="stopJog()">↑</button>

                    <button class="btn jog-left" 
                        onmousedown="startJog('M2', -1)" 
                        onmouseup="stopJog()" 
                        ontouchstart="startJog('M2', -1)" 
                        ontouchend="stopJog()">←</button>

                    <button class="btn danger jog-stop" onclick="emergencyStop()">STOP</button>

                    <button class="btn jog-right" 
                        onmousedown="startJog('M2', 1)" 
                        onmouseup="stopJog()" 
                        ontouchstart="startJog('M2', 1)" 
                        ontouchend="stopJog()">→</button>

                    <button class="btn jog-down" 
                        onmousedown="startJog('M1', -1)" 
                        onmouseup="stopJog()" 
                        ontouchstart="startJog('M1', -1)" 
                        ontouchend="stopJog()">↓</button>
                </div>

                <div class="control-group">
                    <button class="btn secondary" onclick="getCurrentPositions()">📍 Get Current Positions</button>
                </div>
            </div>

            <!-- PRESETS PANEL -->
            <div class="panel">
                <h3>💾 Preset Positions</h3>

                <div class="preset-grid">
                    <div class="preset-btn" id="preset1Card">
                        <div><strong>Preset 1</strong></div>
                        <div id="preset1Text">Empty</div>
                        <div style="margin-top:8px;">
                            <button class="btn secondary" onclick="loadPreset(1)">Load</button>
                            <button class="btn success" onclick="savePreset(1)">Save</button>
                        </div>
                    </div>

                    <div class="preset-btn" id="preset2Card">
                        <div><strong>Preset 2</strong></div>
                        <div id="preset2Text">Empty</div>
                        <div style="margin-top:8px;">
                            <button class="btn secondary" onclick="loadPreset(2)">Load</button>
                            <button class="btn success" onclick="savePreset(2)">Save</button>
                        </div>
                    </div>

                    <div class="preset-btn" id="preset3Card">
                        <div><strong>Preset 3</strong></div>
                        <div id="preset3Text">Empty</div>
                        <div style="margin-top:8px;">
                            <button class="btn secondary" onclick="loadPreset(3)">Load</button>
                            <button class="btn success" onclick="savePreset(3)">Save</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS PANEL -->
            <div class="panel">
                <h3>⚙️ Settings</h3>

                <div class="control-group">
                    <button class="btn secondary" onclick="exportSettings()">📤 Export Settings</button>
                    <button class="btn secondary" onclick="importSettings()">📥 Import Settings</button>
                </div>

                <div class="control-group">
                    <button class="btn warning" onclick="resetToDefaults()">🔄 Reset to Defaults</button>
                </div>

                <div class="control-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="autoConnect" onchange="toggleAutoConnect()">
                        <label for="autoConnect">Auto-connect on load</label>
                    </div>
                </div>
            </div>

        </div> <!-- end grid -->

<script>
/* ============================================================
   GLOBAL STATE
============================================================ */
let isConnected = false;
let bleDevice = null;
let characteristic = null;

let currentSpeedMultiplier = 1.0;
let isRunning = false;
let debugMode = false;

let motorPositions = { m1: 0, m2: 0 };
let presets = { 1: null, 2: null, 3: null };

let jogInterval = null;
let jogRampInterval = null;
let isJogging = false;
let lastSentSpeed = 0;

/* ============================================================
   LOGGING
============================================================ */
function log(message, type = 'info') {
    const timestamp = new Date().toLocaleTimeString();
    const entry = `[${timestamp}] ${message}`;
    console.log(entry);

    if (!debugMode) return;

    const panel = document.getElementById('logPanel');
    if (!panel) return;

    const div = document.createElement('div');
    div.className = 'log-entry';
    div.textContent = entry;

    panel.appendChild(div);
    panel.scrollTop = panel.scrollHeight;

    while (panel.children.length > 200) {
        panel.removeChild(panel.firstChild);
    }
}

function toggleDebugMode() {
    debugMode = document.getElementById('debugMode').checked;
    document.getElementById('debugPanel').classList.toggle('active', debugMode);
}

/* ============================================================
   BLUETOOTH CONNECTION
============================================================ */
async function connectToSlider() {
    try {
        log('Requesting BLE device…');

        // FIXED: always opens picker
        bleDevice = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['12345678-1234-1234-1234-1234567890ab']
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService('12345678-1234-1234-1234-1234567890ab');
        characteristic = await service.getCharacteristic('abcd1234-1234-1234-1234-abcdef123456');

        isConnected = true;
        updateConnectionStatus();
        log('Connected successfully');

        syncSettingsToDevice();

    } catch (err) {
        log(`Connection failed: ${err.message}`, 'error');
        alert('Failed to connect: ' + err.message);
    }
}
function disconnectFromSlider() {
    if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
    }
    isConnected = false;
    characteristic = null;
    updateConnectionStatus();
    log('Disconnected');
}

function updateConnectionStatus() {
    const el = document.getElementById('connectionStatus');
    if (isConnected) {
        el.className = 'status connected';
        el.textContent = 'Connected to Camera Slider';
    } else {
        el.className = 'status disconnected';
        el.textContent = 'Disconnected';
    }
}

/* ============================================================
   COMMAND SENDING
============================================================ */
async function sendCommand(cmd) {
    if (!isConnected || !characteristic) return;

    try {
        await characteristic.writeValue(new TextEncoder().encode(cmd));
        log(`Sent: ${cmd}`);
    } catch (err) {
        log(`Send failed: ${err.message}`, 'error');
    }
}

function sendIfConnected(cmd) {
    if (isConnected) sendCommand(cmd);
}

/* ============================================================
   GENTLE SMOOTH JOG SYSTEM
============================================================ */

async function startJog(motor, direction) {
    if (!isConnected || isJogging) return;

    isJogging = true;
    lastSentSpeed = 0;

    const maxSpeed = 3000 * currentSpeedMultiplier;   // gentle cap
    const accelStep = 8;                              // gentle ramp
    const interval = 20;                              // smooth timing

    let currentSpeed = 0;

    if (jogRampInterval) clearInterval(jogRampInterval);

    jogRampInterval = setInterval(async () => {
        if (!isJogging) {
            clearInterval(jogRampInterval);
            return;
        }

        currentSpeed += accelStep * direction;

        if (Math.abs(currentSpeed) > maxSpeed) {
            currentSpeed = maxSpeed * direction;
        }

        lastSentSpeed = currentSpeed;
        await sendCommand(`JOG:${motor}:${Math.round(currentSpeed)}`);

    }, interval);

    log(`Jogging ${motor} (gentle accel)`);
}

async function stopJog() {
    if (!isJogging) return;

    isJogging = false;

    if (jogRampInterval) clearInterval(jogRampInterval);

    let speed = lastSentSpeed;

    while (Math.abs(speed) > 5) {
        speed *= 0.7;  // gentle decel
        await sendCommand(`JOG:STOP:${Math.round(speed)}`);
        await new Promise(r => setTimeout(r, 20));
    }

    await sendCommand('JOG:STOP:0');
    lastSentSpeed = 0;

    log('Jog stopped gently');
}

/* ============================================================
   SEQUENCE CONTROL
============================================================ */
async function startSequence() {
    if (!isConnected) return alert('Connect first');

    if (isRunning) {
        await sendCommand('STOP');
        isRunning = false;
        log('Sequence paused');
    } else {
        await syncSettingsToDevice();
        await sendCommand('RUN');
        isRunning = true;
        log('Sequence started');
    }

    updateSequenceButtons();
}

async function stopSequence() {
    if (!isConnected) return;
    await sendCommand('STOP');
    isRunning = false;
    updateSequenceButtons();
    log('Sequence stopped');
}

async function homeMotors() {
    if (!isConnected) return alert('Connect first');
    await sendCommand('HOME');
    log('Homing motors…');
}

async function emergencyStop() {
    if (!isConnected) return;
    await sendCommand('STOP');
    stopJog();
    isRunning = false;
    updateSequenceButtons();
    log('EMERGENCY STOP');
}

function updateSequenceButtons() {
    const btns = document.querySelectorAll('button[onclick="startSequence()"]');
    btns.forEach(btn => {
        if (isRunning) {
            btn.innerHTML = '⏸️ Pause';
            btn.classList.remove('success');
            btn.classList.add('warning');
        } else {
            btn.innerHTML = '▶️ Start Sequence';
            btn.classList.remove('warning');
            btn.classList.add('success');
        }
    });
}

/* ============================================================
   SPEED + UI UPDATES
============================================================ */
function updateSpeedMultiplier(v) {
    currentSpeedMultiplier = parseFloat(v);
    document.getElementById('speedMultiplierValue').textContent = `${v}x`;
    saveSettings();
}

function updateSpeedDisplay(motor, value) {
    document.getElementById(motor + 'SpeedValue').textContent = value;
}

/* ============================================================
   PRESETS
============================================================ */
function savePreset(n) {
    presets[n] = {
        m1Start: +m1Start.value,
        m1End: +m1End.value,
        m1Speed: +m1Speed.value,
        m2Start: +m2Start.value,
        m2End: +m2End.value,
        m2Speed: +m2Speed.value,
        cycles: +cycles.value,
        returnHome: returnHome.checked,
        timestamp: new Date().toLocaleString()
    };

    updatePresetDisplay(n);
    saveSettings();
    log(`Preset ${n} saved`);
}

function loadPreset(n) {
    const p = presets[n];
    if (!p) return alert(`Preset ${n} empty`);

    m1Start.value = p.m1Start;
    m1End.value = p.m1End;
    m1Speed.value = p.m1Speed;
    m2Start.value = p.m2Start;
    m2End.value = p.m2End;
    m2Speed.value = p.m2Speed;
    cycles.value = p.cycles;
    returnHome.checked = p.returnHome;

    updateAllDisplayValues();
    updateEstimatedTime();
    saveSettings();

    if (isConnected) syncSettingsToDevice();

    log(`Preset ${n} loaded`);
}

function updatePresetDisplay(n) {
    const p = presets[n];
    const text = document.getElementById(`preset${n}Text`);
    const card = document.getElementById(`preset${n}Card`);

    if (!p) {
        text.textContent = 'Empty';
        card.classList.remove('set');
        return;
    }

    text.innerHTML = `
        M1: ${p.m1Start}→${p.m1End}<br>
        M2: ${p.m2Start}→${p.m2End}<br>
        <small>${p.timestamp}</small>
    `;
    card.classList.add('set');
}

/* ============================================================
   SETTINGS SAVE/LOAD
============================================================ */
function saveSettings() {
    const settings = {
        m1Start: +m1Start.value,
        m1End: +m1End.value,
        m1Speed: +m1Speed.value,
        m2Start: +m2Start.value,
        m2End: +m2End.value,
        m2Speed: +m2Speed.value,
        cycles: +cycles.value,
        returnHome: returnHome.checked,
        speedMultiplier: currentSpeedMultiplier,
        presets,
        autoConnect: autoConnect.checked
    };

    localStorage.setItem('cameraSliderSettings', JSON.stringify(settings));
}

function loadSettings() {
    const saved = localStorage.getItem('cameraSliderSettings');
    if (!saved) return;

    try {
        const s = JSON.parse(saved);

        m1Start.value = s.m1Start ?? 0;
        m1End.value = s.m1End ?? 2000;
        m1Speed.value = s.m1Speed ?? 2000;

        m2Start.value = s.m2Start ?? 0;
        m2End.value = s.m2End ?? 2000;
        m2Speed.value = s.m2Speed ?? 2000;

        cycles.value = s.cycles ?? 1;
        returnHome.checked = s.returnHome ?? true;

        currentSpeedMultiplier = s.speedMultiplier ?? 1.0;
        speedMultiplier.value = currentSpeedMultiplier;

        presets = s.presets ?? presets;
        for (let i = 1; i <= 3; i++) updatePresetDisplay(i);

        autoConnect.checked = s.autoConnect ?? false;

        updateAllDisplayValues();
        updateEstimatedTime();

        log('Settings loaded');

    } catch (err) {
        log(`Failed to load settings: ${err.message}`, 'error');
    }
}

/* ============================================================
   SETTINGS IMPORT/EXPORT
============================================================ */
function exportSettings() {
    saveSettings();
    const data = JSON.stringify(JSON.parse(localStorage.getItem('cameraSliderSettings')), null, 2);
    const blob = new Blob([data], { type: 'application/json' });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'camera-slider-settings.json';
    a.click();

    log('Settings exported');
}

function importSettings() {
    document.getElementById('fileInput').click();
}

function handleFileImport(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = evt => {
        try {
            const s = JSON.parse(evt.target.result);

            m1Start.value = s.m1Start;
            m1End.value = s.m1End;
            m1Speed.value = s.m1Speed;

            m2Start.value = s.m2Start;
            m2End.value = s.m2End;
            m2Speed.value = s.m2Speed;

            cycles.value = s.cycles;
            returnHome.checked = s.returnHome;

            currentSpeedMultiplier = s.speedMultiplier;
            speedMultiplier.value = currentSpeedMultiplier;

            presets = s.presets;
            for (let i = 1; i <= 3; i++) updatePresetDisplay(i);

            autoConnect.checked = s.autoConnect;

            updateAllDisplayValues();
            updateEstimatedTime();
            saveSettings();

            if (isConnected) syncSettingsToDevice();

            alert('Settings imported');
            log('Settings imported');

        } catch (err) {
            alert('Import failed: ' + err.message);
            log(`Import failed: ${err.message}`, 'error');
        }
    };

    reader.readAsText(file);
    e.target.value = '';
}

/* ============================================================
   ESTIMATED TIME
============================================================ */
function updateEstimatedTime() {
    const m1Dist = Math.abs(+m1End.value - +m1Start.value);
    const m2Dist = Math.abs(+m2End.value - +m2Start.value);

    const m1Time = m1Dist / (+m1Speed.value * currentSpeedMultiplier);
    const m2Time = m2Dist / (+m2Speed.value * currentSpeedMultiplier);

    let cycleTime = Math.max(m1Time, m2Time);
    if (returnHome.checked) cycleTime *= 2;

    let total = cycleTime * (+cycles.value || 1);

    const el = document.getElementById('estimatedTime');

    if (+cycles.value === 0) {
        el.textContent = '∞ (Infinite)';
    } else if (total < 60) {
        el.textContent = `${total.toFixed(1)}s`;
    } else {
        const m = Math.floor(total / 60);
        const s = Math.floor(total % 60);
        el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }
}

/* ============================================================
   INITIALISATION
============================================================ */
function updateAllDisplayValues() {
    updateSpeedDisplay('m1', m1Speed.value);
    updateSpeedDisplay('m2', m2Speed.value);
    speedMultiplierValue.textContent = `${currentSpeedMultiplier}x`;
}

function toggleAutoConnect() {
    saveSettings();
}

document.addEventListener('DOMContentLoaded', () => {
    loadSettings();
    updateAllDisplayValues();
    updateEstimatedTime();

    if (autoConnect.checked) {
        setTimeout(connectToSlider, 800);
    }

    log('UI initialised');
});

/* ============================================================
   ERROR HANDLING
============================================================ */
window.addEventListener('error', e => {
    log(`JS Error: ${e.message}`, 'error');
});

window.addEventListener('unhandledrejection', e => {
    log(`Promise Error: ${e.reason}`, 'error');
});
</script>

        <h3>🐛 Debug Console</h3>
        <div class="log-panel" id="logPanel"></div>
        <button class="btn secondary" onclick="document.getElementById('logPanel').innerHTML=''">Clear Log</button>
    </div>

    <!-- Quick Actions Bar -->
    <div class="quick-actions-bar">
        <button class="btn success" onclick="startSequence()" title="Start/Pause">▶️</button>
        <button class="btn danger" onclick="stopSequence()" title="Stop">⏹️</button>
        <button class="btn secondary" onclick="homeMotors()" title="Home">🏠</button>
        <button class="btn warning" onclick="emergencyStop()" title="Emergency Stop">🛑</button>
    </div>
